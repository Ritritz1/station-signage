<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slideshow Film Filter - The Station</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; background:#2a0f14; color:#f8efd8; max-width:560px; margin:60px auto; padding:0 20px; }
    h1 { font-size:1.4rem; color:#d4a523; }
    p.help { color:#e6d9b7; font-size:0.9rem; }
    label.item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #3a131a; font-size:1rem; }
    label.item input { width:20px; height:20px; }
    input#passcode { width:100%; padding:10px; margin-top:6px; border-radius:6px; border:none; font-size:1rem; box-sizing:border-box; text-align:center; }
    button { margin-top:24px; width:100%; padding:14px; background:#d4a523; color:#2a0f14; font-weight:700; border:none; border-radius:6px; font-size:1rem; cursor:pointer; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    #status { margin-top:16px; font-size:0.95rem; }
    #gate { text-align:center; }
  </style>
</head>
<body>
  <div id="gate">
    <h1>Slideshow Film Filter</h1>
    <label>Enter passcode</label>
    <input type="password" id="passcode" autocomplete="off">
    <button id="unlockBtn">Unlock</button>
  </div>

  <div id="app" style="display:none">
    <h1>Choose which films appear</h1>
    <p class="help">Untick a film to hide it from the slideshow's poster carousel. Ticked films still show as normal.</p>
    <div id="list">Loading films...</div>
    <button id="saveBtn">Save</button>
    <div id="status"></div>
  </div>

  <script src="slideshow-config.js"></script>
  <script>
    document.getElementById("unlockBtn").addEventListener("click", async function () {
      var entered = document.getElementById("passcode").value;
      if (entered !== window.UPLOAD_PASSCODE) {
        alert("Wrong passcode.");
        return;
      }
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";
      await loadFilms();
    });

    function getSb() {
      return window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    }

    async function fetchJson(path, fallback) {
      try {
        var sb = getSb();
        var { data: pub } = sb.storage.from(window.SUPABASE_BUCKET).getPublicUrl(path);
        var res = await fetch(pub.publicUrl + "?_=" + Date.now(), { cache: "no-store" });
        if (!res.ok) return fallback;
        return await res.json();
      } catch (e) {
        return fallback;
      }
    }

    async function loadFilms() {
      var listEl = document.getElementById("list");
      var res = await fetch("new_this_week.json?_=" + Date.now()).catch(function () { return null; });
      var data = res && res.ok ? await res.json().catch(function () { return null; }) : null;
      var films = (data && data.films) || [];

      var excludedData = await fetchJson("config/excluded_films.json", { excluded: [] });
      var excluded = (excludedData && excludedData.excluded) || [];
      var excludedLower = excluded.map(function (t) { return t.toLowerCase(); });

      if (!films.length) {
        listEl.textContent = "No films currently listed.";
        return;
      }

      listEl.innerHTML = "";
      films.forEach(function (title) {
        var wrap = document.createElement("label");
        wrap.className = "item";
        var cb = document.createElement("input");
        cb.type = "checkbox";
        cb.value = title;
        cb.checked = excludedLower.indexOf(title.toLowerCase()) === -1;
        wrap.appendChild(cb);
        var span = document.createElement("span");
        span.textContent = title;
        wrap.appendChild(span);
        listEl.appendChild(wrap);
      });
    }

    document.getElementById("saveBtn").addEventListener("click", async function () {
      var status = document.getElementById("status");
      var btn = document.getElementById("saveBtn");
      var checkboxes = document.querySelectorAll("#list input[type=checkbox]");
      var excluded = [];
      checkboxes.forEach(function (cb) {
        if (!cb.checked) excluded.push(cb.value);
      });

      btn.disabled = true;
      status.textContent = "Saving...";

      var sb = getSb();
      var payload = JSON.stringify({ excluded: excluded, updated: new Date().toISOString() });
      var blob = new Blob([payload], { type: "application/json" });

      var result = await sb.storage.from(window.SUPABASE_BUCKET).upload(
        "config/excluded_films.json", blob, { upsert: true, contentType: "application/json" }
      );

      btn.disabled = false;
      if (result.error) {
        status.textContent = "Save failed: " + result.error.message;
      } else {
        status.textContent = "Saved! The display will pick this up within 15 minutes, or refresh it now.";
      }
    });
  </script>
</body>
</html>
