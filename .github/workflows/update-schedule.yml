name: Update Cinema Schedule

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape schedule
        run: python scrape_schedule.py

      - name: Commit updated schedule.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.js
          git diff --cached --quiet || git commit -m "chore: update schedule $(date -u +'%Y-%m-%d')"
          git push
