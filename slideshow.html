<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>The Station Cinema - Slideshow</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
    #slide-container { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
    .slide-video { width:100%; height:100%; object-fit:contain; background:#000; }
    .slide-poster-wrap { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#0a0a0a; }
    .slide-poster { max-width:90%; max-height:80%; object-fit:contain; box-shadow:0 20px 60px rgba(0,0,0,0.6); border-radius:8px; }
    .slide-new-badge { position:absolute; top:6%; left:50%; transform:translateX(-50%); background:#F7C2C4; color:#193A40; font-family:sans-serif; font-weight:700; letter-spacing:2px; padding:10px 24px; border-radius:999px; font-size:1.4vw; }
    .slide-title { position:absolute; bottom:6%; left:50%; transform:translateX(-50%); color:#fff; font-family:sans-serif; font-size:2.2vw; font-weight:600; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,0.8); }
    .slide-empty { color:#888; font-family:sans-serif; font-size:1.5vw; text-align:center; }
  </style>
</head>
<body>
  <div id="slide-container"></div>
  <script src="slideshow-config.js"></script>
  <script src="slideshow.js"></script>
</body>
</html>
