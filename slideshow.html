<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>The Station Cinema - Slideshow</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#2a0f14;--panel:#3a131a;--fg:#f8efd8;--muted:#e6d9b7;--accent:#d4a523;}
    html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif; }
    #stage { width:1920px; height:1080px; position:absolute; top:0; left:0; transform-origin:top left; background:var(--bg); overflow:hidden; }
    #slide-container { width:1920px; height:1080px; display:flex; align-items:center; justify-content:center; background:var(--bg); }
    .slide-video { width:1920px; height:1080px; object-fit:contain; background:var(--bg); }
    .slide-poster-wrap { position:relative; width:1920px; height:1080px; background:var(--bg); overflow:hidden; }
    .slide-backdrop { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .slide-backdrop.blurred { filter:blur(40px) brightness(0.55); transform:scale(1.15); }
    .slide-center-poster { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); height:80%; width:auto; border-radius:12px; outline:4px solid var(--accent); box-shadow:0 20px 60px rgba(0,0,0,.7); z-index:1; }
    .slide-scrim { position:absolute; inset:0; background:linear-gradient(180deg, rgba(42,15,20,.55) 0%, rgba(42,15,20,.15) 30%, rgba(42,15,20,.15) 55%, rgba(42,15,20,.92) 100%); }
    .slide-logo { position:absolute; top:36px; left:48px; height:70px; width:auto; filter:drop-shadow(0 0 8px rgba(0,0,0,.6)); z-index:2; }
    .slide-new-badge { position:absolute; top:120px; left:48px; background:var(--accent); color:var(--bg); font-weight:900; letter-spacing:2px; padding:10px 28px; border-radius:999px; font-size:20px; box-shadow:0 0 14px rgba(0,0,0,.5); z-index:2; }
    .slide-new-badge.coming-soon { background:var(--fg); color:var(--bg); }
    .slide-footer { position:absolute; bottom:0; left:0; right:0; display:flex; align-items:flex-end; gap:32px; padding:48px 64px; z-index:2; }
    .slide-poster-thumb { height:240px; width:auto; border-radius:8px; outline:3px solid var(--accent); box-shadow:0 8px 24px rgba(0,0,0,.6); }
    .slide-title { color:var(--fg); font-weight:800; font-size:56px; text-shadow:0 2px 16px rgba(0,0,0,.85); padding-bottom:16px; }
    .slide-empty { color:var(--muted); font-family:system-ui,sans-serif; font-size:28px; text-align:center; }
  </style>
</head>
<body>
  <div id="stage">
    <div id="slide-container"></div>
  </div>
  <script src="slideshow-config.js"></script>
  <script src="slideshow.js"></script>
  <script>
    function fitStage() {
      var vw = document.documentElement.clientWidth || window.innerWidth;
      var vh = document.documentElement.clientHeight || window.innerHeight;
      if (!vw || !vh) return;
      var scale = Math.min(vw / 1920, vh / 1080);
      var stage = document.getElementById('stage');
      var w = 1920 * scale, h = 1080 * scale;
      stage.style.transform = 'scale(' + scale + ')';
      stage.style.left = ((vw - w) / 2) + 'px';
      stage.style.top = ((vh - h) / 2) + 'px';
    }
    window.addEventListener('resize', fitStage);
    window.addEventListener('orientationchange', fitStage);
    window.addEventListener('load', fitStage);
    fitStage();
    setTimeout(fitStage, 300);
    setTimeout(fitStage, 1000);
    setTimeout(fitStage, 3000);
  </script>
</body>
</html>
