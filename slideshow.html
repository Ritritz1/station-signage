<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>The Station Cinema - Slideshow</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#2a0f14;--panel:#3a131a;--fg:#f8efd8;--muted:#e6d9b7;--accent:#d4a523;}
    html, body { margin:0; padding:0; width:100%; height:100%; background:var(--bg); overflow:hidden; font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif; }
    #slide-container { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); }
    .slide-video { width:100%; height:100%; object-fit:contain; background:var(--bg); }
    .slide-poster-wrap { position:relative; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg); }
    .slide-logo { position:absolute; top:4%; left:50%; transform:translateX(-50%); max-height:9vh; width:auto; filter:drop-shadow(0 0 6px rgba(212,165,35,.4)); }
    .slide-poster { max-width:44%; max-height:66%; object-fit:contain; border-radius:1vmin; outline:2px solid var(--accent); box-shadow:0 0 24px rgba(0,0,0,.5), 0 0 30px rgba(212,165,35,.15); margin-top:2vh; }
    .slide-new-badge { margin-top:3vh; background:var(--accent); color:var(--bg); font-weight:900; letter-spacing:.12em; padding:.6vh 3vw; border-radius:999px; font-size:2.1vh; text-shadow:none; box-shadow:0 0 14px rgba(212,165,35,.4); }
    .slide-title { margin-top:2vh; color:var(--fg); font-weight:800; font-size:4vh; text-align:center; letter-spacing:.01em; text-shadow:0 0 10px rgba(0,0,0,.6); }
    .slide-empty { color:var(--muted); font-family:system-ui,sans-serif; font-size:1.5vw; text-align:center; }
  </style>
</head>
<body>
  <div id="slide-container"></div>
  <script src="slideshow-config.js"></script>
  <script src="slideshow.js"></script>
</body>
</html>
